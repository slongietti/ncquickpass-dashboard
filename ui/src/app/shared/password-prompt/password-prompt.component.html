@if (open) {
  <div class="pw-overlay">
    <div class="pw-card" role="dialog" aria-modal="true" [attr.aria-label]="title">
      <h3>{{ title }}</h3>
      <p><ng-content /></p>
      <input
        type="password"
        class="pw-input"
        [(ngModel)]="password"
        placeholder="NC Quick Pass password"
        autocomplete="current-password"
        (keyup.enter)="submit()"
      />
      @if (error) {
        <div class="pw-error" role="alert">{{ error }}</div>
      }
      <div class="pw-actions">
        <button type="button" class="btn-primary" (click)="submit()" [disabled]="busy || !password">
          {{ busy ? 'Verifying…' : confirmLabel }}
        </button>
        <button type="button" class="btn-ghost" (click)="onCancel()" [disabled]="busy">Cancel</button>
      </div>
    </div>
  </div>
}
