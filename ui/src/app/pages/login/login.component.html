<div class="login-wrap">
  <form class="login-card" (ngSubmit)="submit()">
    <app-ncqp-logo class="login-logo" [height]="40" />
    <p class="subtitle">Dashboard</p>

    @if (error(); as err) {
      <div class="alert" role="alert">{{ err }}</div>
    }

    <label>
      <span>Username</span>
      <input
        name="username"
        type="text"
        autocomplete="username"
        [(ngModel)]="username"
        [disabled]="loading()"
        required
      />
    </label>

    <label>
      <span>Password</span>
      <input
        name="password"
        type="password"
        autocomplete="current-password"
        [(ngModel)]="password"
        [disabled]="loading()"
        required
      />
    </label>

    <button type="submit" [disabled]="loading() || !username || !password">
      {{ loading() ? 'Signing in…' : 'Sign in' }}
    </button>

    <p class="fineprint">
      By default your credentials are not stored, unless you opt into background processes that use
      your encrypted credentials. <a href="/how-it-works" target="_blank" rel="noopener">Read more</a>.
    </p>

    <p class="built-by">
      Powered by <img class="volare-inline" src="assets/volare-logo.png" alt="Volare" />
    </p>
  </form>
</div>
