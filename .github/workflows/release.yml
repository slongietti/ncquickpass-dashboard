name: release

# Runs when a GitHub Release is published. Applies that release's pending Prisma
# migrations to Neon, points the Lambda at the released image, then promotes it
# to :latest. Kept separate from build.yml so the build pipeline stays build-only.

on:
  release:
    types: [released]

permissions:
  contents: read
  id-token: write

jobs:
  # Apply pending Prisma migrations to Neon before the new code goes live, via
  # the shared reusable workflow. Idempotent (`migrate deploy` applies only
  # pending migrations, never drops data). DATABASE_URL comes from the
  # 'production' Environment. On Prisma 7 a single Neon POOLED string works for
  # both `migrate deploy` and the app runtime, so this same secret is reused by
  # sync-env below. (If migrations ever hit the PgBouncer "prepared statement
  # s0 already exists" error, switch this secret to Neon's direct URL.)
  db-deploy:
    uses: Volare-Consulting-Software/.github/.github/workflows/prisma-deploy.yml@main
    with:
      working-directory: api
      checkout-ref: ${{ github.event.release.tag_name }}
      environment-name: production
    secrets:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

  # Push DATABASE_URL from the 'production' secret onto the Lambda's environment
  # via the shared reusable workflow (merge-preserving the function's other vars),
  # so the credential lives in one place you edit (the GitHub secret) and CI keeps
  # the function in sync — no manual console edits, no drift when it's rotated.
  sync-env:
    needs: db-deploy
    uses: Volare-Consulting-Software/.github/.github/workflows/set-lambda-env-var.yml@main
    permissions:
      contents: read
      id-token: write
    with:
      function-name: ncquickpass
      var-name: DATABASE_URL
      aws-region: us-east-1
      environment-name: production
    secrets:
      var-value: ${{ secrets.DATABASE_URL }}
      OIDC_AWS_ROLE_ARN: ${{ secrets.OIDC_AWS_ROLE_ARN }}

  # Update the Lambda function to the released image tag.
  deploy:
    needs: sync-env
    uses: Volare-Consulting-Software/.github/.github/workflows/deploy-aws-lambda.yml@main
    permissions:
      contents: read
      id-token: write
    with:
      function-name: ncquickpass
      image-name: ncquickpass
      image-tag: ${{ github.event.release.tag_name }}
      aws-region: us-east-1
    secrets:
      OIDC_AWS_ROLE_ARN: ${{ secrets.OIDC_AWS_ROLE_ARN }}

  # Registry-side retag the released version image to :latest (no rebuild).
  promote-latest:
    needs: deploy
    uses: Volare-Consulting-Software/.github/.github/workflows/push-container-image.yml@main
    permissions:
      contents: read
      id-token: write
    with:
      registry: ecr
      aws-region: us-east-1
      image-name: ncquickpass
      source-tag: ${{ github.event.release.tag_name }}
      dest-tags: latest
    secrets:
      OIDC_AWS_ROLE_ARN: ${{ secrets.OIDC_AWS_ROLE_ARN }}
